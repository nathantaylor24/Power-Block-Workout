<script>
/* =========================
   GLOBALS
========================= */

let viewHistory = [];
let appState = {};

try {
    appState = JSON.parse(localStorage.getItem('appState')) || {};
} catch (e) {
    localStorage.removeItem('appState');
    appState = {};
}

// Debug helper (REMOVE LATER if you want)
window.onerror = function(message) {
    alert("Error: " + message);
};

/* =========================
   DATA
========================= */

const workoutData = {
    A: {
        name: 'Chest & Back',
        exercises: [
            { name: 'DB Bench Press', sets: 4, reps: 8 },
            { name: 'DB Rows', sets: 4, reps: 8 }
        ]
    }
};

/* =========================
   STATE
========================= */

let currentWorkout = null;
let currentExerciseIdx = 0;
let currentSetIdx = 0;
let weights = {};
let completedSets = {};
let timerInterval = null;

/* =========================
   SAFE DOM HELPERS
========================= */

function setText(id, value) {
    const el = document.getElementById(id);
    if (el) el.textContent = value;
}

function setDisplay(id, value) {
    const el = document.getElementById(id);
    if (el) el.style.display = value;
}

/* =========================
   SAVE / LOAD
========================= */

function saveState() {
    try {
        appState = {
            currentWorkout,
            currentExerciseIdx,
            currentSetIdx,
            weights,
            completedSets,
            view: document.querySelector('.view.active')?.id
        };
        localStorage.setItem('appState', JSON.stringify(appState));
    } catch (e) {
        console.warn("Save failed", e);
    }
}

function loadState() {
    if (!appState.currentWorkout) return;

    currentWorkout = appState.currentWorkout;
    currentExerciseIdx = appState.currentExerciseIdx || 0;
    currentSetIdx = appState.currentSetIdx || 0;
    weights = appState.weights || {};
    completedSets = appState.completedSets || {};

    showView(appState.view || 'selectView', false);

    if (currentWorkout && appState.view === 'workoutView') {
        updateWorkoutView();
        setDisplay('headerStats', 'block');
    }
}

/* =========================
   NAVIGATION
========================= */

function showView(id, push = true) {
    const current = document.querySelector('.view.active');

    if (current && push) {
        viewHistory.push(current.id);
        history.pushState({ view: id }, '', '');
    }

    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

    const next = document.getElementById(id);
    if (next) next.classList.add('active');

    saveState();
}

function goBack() {
    if (viewHistory.length === 0) return;

    const prev = viewHistory.pop();
    showView(prev, false);
}

window.onpopstate = function () {
    if (viewHistory.length > 0) {
        const prev = viewHistory.pop();
        showView(prev, false);
    }
};

/* =========================
   WORKOUT FLOW
========================= */

function goSelectWorkout(w) {
    currentWorkout = w;
    currentExerciseIdx = 0;
    currentSetIdx = 0;
    weights = {};
    completedSets = {};

    setText('preWorkoutLetter', w);
    setText('preWorkoutName', workoutData[w]?.name || '');

    showView('preWorkoutView');
}

function goStartWorkout() {
    updateWorkoutView();
    showView('workoutView');
    setDisplay('headerStats', 'block');
}

function updateWorkoutView() {
    const workout = workoutData[currentWorkout];
    if (!workout) return;

    const exercise = workout.exercises[currentExerciseIdx];
    if (!exercise) return;

    setText('exerciseName', exercise.name);
    setText('exerciseReps', exercise.reps);

    saveState();
}

/* =========================
   TIMER (SAFE)
========================= */

function startTimer(seconds) {
    clearInterval(timerInterval);

    let timeRemaining = seconds;

    timerInterval = setInterval(() => {
        timeRemaining--;

        if (timeRemaining <= 0) {
            clearInterval(timerInterval);
        }
    }, 1000);
}

/* =========================
   INIT
========================= */

window.addEventListener('load', () => {
    try {
        loadState();
    } catch (e) {
        console.error("Load failed", e);
        localStorage.removeItem('appState');
    }
});
</script>
