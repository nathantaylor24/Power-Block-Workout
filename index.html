<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Block Workout</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #111;
            color: white;
            text-align: center;
        }

        .view {
            display: none;
            padding: 20px;
        }

        .view.active {
            display: block;
        }

        button {
            padding: 15px 20px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #2ecc71;
            color: white;
        }

        .back {
            background: #555;
        }

        #headerStats {
            display: none;
            padding: 10px;
            background: #222;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div id="headerStats">
    <div id="headerTitle">Workout</div>
    <div id="headerSubtitle">In Progress</div>
</div>

<!-- SELECT VIEW -->
<div id="selectView" class="view active">
    <h1>Select Workout</h1>
    <button onclick="goSelectWorkout('A')">Workout A</button>
    <button onclick="goSelectWorkout('B')">Workout B</button>
    <button onclick="goSelectWorkout('C')">Workout C</button>
</div>

<!-- PRE WORKOUT -->
<div id="preWorkoutView" class="view">
    <h1 id="preWorkoutLetter"></h1>
    <h2 id="preWorkoutName"></h2>
    <button onclick="goStartWorkout()">Start Workout</button>
    <button class="back" onclick="goBack()">Back</button>
</div>

<!-- WORKOUT VIEW -->
<div id="workoutView" class="view">
    <h2 id="exerciseName"></h2>
    <p>Reps: <span id="exerciseReps"></span></p>
    <button onclick="startTimer(30)">Start Rest Timer</button>
    <button class="back" onclick="goBack()">Back</button>
</div>

<script>
/* =========================
   GLOBALS
========================= */

let viewHistory = [];
let appState = {};

try {
    appState = JSON.parse(localStorage.getItem('appState')) || {};
} catch (e) {
    localStorage.removeItem('appState');
    appState = {};
}

// Debug helper (REMOVE LATER)
window.onerror = function(message) {
    alert("Error: " + message);
};

/* =========================
   DATA
========================= */

const workoutData = {
    A: {
        name: 'Chest & Back',
        exercises: [
            { name: 'DB Bench Press', reps: 8 },
            { name: 'DB Rows', reps: 8 }
        ]
    },
    B: {
        name: 'Shoulders & Triceps',
        exercises: [
            { name: 'Shoulder Press', reps: 10 }
        ]
    },
    C: {
        name: 'Legs & Glutes',
        exercises: [
            { name: 'Goblet Squats', reps: 12 }
        ]
    }
};

/* =========================
   STATE
========================= */

let currentWorkout = null;
let currentExerciseIdx = 0;
let timerInterval = null;

/* =========================
   SAFE DOM HELPERS
========================= */

function setText(id, value) {
    const el = document.getElementById(id);
    if (el) el.textContent = value;
}

function setDisplay(id, value) {
    const el = document.getElementById(id);
    if (el) el.style.display = value;
}

/* =========================
   SAVE / LOAD
========================= */

function saveState() {
    try {
        appState = {
            currentWorkout,
            currentExerciseIdx,
            view: document.querySelector('.view.active')?.id
        };
        localStorage.setItem('appState', JSON.stringify(appState));
    } catch (e) {}
}

function loadState() {
    if (!appState.currentWorkout) return;

    currentWorkout = appState.currentWorkout;
    currentExerciseIdx = appState.currentExerciseIdx || 0;

    showView(appState.view || 'selectView', false);

    if (currentWorkout && appState.view === 'workoutView') {
        updateWorkoutView();
        setDisplay('headerStats', 'block');
    }
}

/* =========================
   NAVIGATION
========================= */

function showView(id, push = true) {
    const current = document.querySelector('.view.active');

    if (current && push) {
        viewHistory.push(current.id);
        history.pushState({ view: id }, '', '');
    }

    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

    const next = document.getElementById(id);
    if (next) next.classList.add('active');

    saveState();
}

function goBack() {
    if (viewHistory.length === 0) return;

    const prev = viewHistory.pop();
    showView(prev, false);
}

window.onpopstate = function () {
    if (viewHistory.length > 0) {
        const prev = viewHistory.pop();
        showView(prev, false);
    }
};

/* =========================
   WORKOUT FLOW
========================= */

function goSelectWorkout(w) {
    currentWorkout = w;
    currentExerciseIdx = 0;

    setText('preWorkoutLetter', w);
    setText('preWorkoutName', workoutData[w]?.name || '');

    showView('preWorkoutView');
}

function goStartWorkout() {
    updateWorkoutView();
    showView('workoutView');
    setDisplay('headerStats', 'block');
}

function updateWorkoutView() {
    const workout = workoutData[currentWorkout];
    if (!workout) return;

    const exercise = workout.exercises[currentExerciseIdx];
    if (!exercise) return;

    setText('exerciseName', exercise.name);
    setText('exerciseReps', exercise.reps);

    saveState();
}

/* =========================
   TIMER
========================= */

function startTimer(seconds) {
    clearInterval(timerInterval);

    let timeRemaining = seconds;

    timerInterval = setInterval(() => {
        timeRemaining--;

        if (timeRemaining <= 0) {
            clearInterval(timerInterval);
        }
    }, 1000);
}

/* =========================
   INIT
========================= */

window.addEventListener('load', () => {
    try {
        loadState();
    } catch (e) {
        localStorage.removeItem('appState');
    }
});
</script>

</body>
</html>
