<script>
let viewHistory = [];
let appState = JSON.parse(localStorage.getItem('appState')) || {};

const workoutData = {
    A: {
        name: 'Chest & Back',
        finisher: 'BOSU Jump Squats (30sec work / 30sec rest × 3)',
        exercises: [
            { name: 'DB Bench Press', sets: 4, reps: 8, tempo: '3-1-2', rest: 45 },
            { name: 'DB Rows (Bench Supported)', sets: 4, reps: 8, tempo: '2-1-3', rest: 45 },
            { name: 'Incline DB Press', sets: 3, reps: 10, tempo: '2-1-2', rest: 30 },
            { name: 'Single Arm DB Rows', sets: 3, reps: 10, tempo: '2-1-3', rest: 30 },
            { name: 'DB Flyes (Bench)', sets: 2, reps: 12, tempo: '3-1-2', rest: 20 },
            { name: 'DB Reverse Flyes', sets: 2, reps: 12, tempo: '2-1-2', rest: 20 }
        ]
    },
    B: {
        name: 'Shoulders & Triceps',
        finisher: 'Mountain Climbers on BOSU (40sec work / 20sec rest × 3)',
        exercises: [
            { name: 'DB Shoulder Press', sets: 4, reps: 8, tempo: '2-1-2', rest: 45 },
            { name: 'DB Lateral Raises', sets: 4, reps: 10, tempo: '2-1-2', rest: 30 },
            { name: 'Overhead DB Tricep Extension', sets: 3, reps: 10, tempo: '2-1-2', rest: 30 },
            { name: 'DB Chest Supported Incline Rows', sets: 3, reps: 10, tempo: '2-1-3', rest: 30 },
            { name: 'Single DB Lateral Raise', sets: 2, reps: 12, tempo: '2-1-2', rest: 20 },
            { name: 'Tricep Kickbacks', sets: 2, reps: 12, tempo: '2-1-1', rest: 20 }
        ]
    },
    C: {
        name: 'Legs & Glutes',
        finisher: 'Jump Squats + Burpees (20sec × 2 rounds)',
        exercises: [
            { name: 'DB Goblet Squats', sets: 4, reps: 10, tempo: '3-1-2', rest: 45 },
            { name: 'DB Romanian Deadlifts', sets: 4, reps: 8, tempo: '3-1-2', rest: 45 },
            { name: 'DB Bulgarian Split Squats', sets: 3, reps: 10, tempo: '2-1-2', rest: 30 },
            { name: 'DB Step-ups (Bench)', sets: 3, reps: 10, tempo: '2-1-1', rest: 30 },
            { name: 'DB Walking Lunges', sets: 2, reps: 12, tempo: '2-1-2', rest: 20 },
            { name: 'Sumo DB Deadlifts', sets: 2, reps: 12, tempo: '3-1-2', rest: 20 }
        ]
    }
};

let currentWorkout = null;
let currentExerciseIdx = 0;
let currentSetIdx = 0;
let weights = {};
let completedSets = {};
let timerInterval = null;
let timeRemaining = 0;

/* =========================
   STATE SAVE / LOAD
========================= */

function saveState() {
    appState = {
        currentWorkout,
        currentExerciseIdx,
        currentSetIdx,
        weights,
        completedSets,
        view: document.querySelector('.view.active')?.id
    };
    localStorage.setItem('appState', JSON.stringify(appState));
}

function loadState() {
    if (!appState.currentWorkout) return;

    currentWorkout = appState.currentWorkout;
    currentExerciseIdx = appState.currentExerciseIdx;
    currentSetIdx = appState.currentSetIdx;
    weights = appState.weights || {};
    completedSets = appState.completedSets || {};

    showView(appState.view || 'selectView', false);

    if (currentWorkout && appState.view === 'workoutView') {
        updateWorkoutView();
        document.getElementById('headerStats').style.display = 'block';
    }
}

/* =========================
   NAVIGATION
========================= */

function showView(id, push = true) {
    const current = document.querySelector('.view.active');
    if (current && push) {
        viewHistory.push(current.id);
        history.pushState({ view: id }, '', '');
    }

    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    saveState();
}

function goBack() {
    if (viewHistory.length === 0) return;

    const prev = viewHistory.pop();
    showView(prev, false);
}

window.onpopstate = function () {
    if (viewHistory.length > 0) {
        const prev = viewHistory.pop();
        showView(prev, false);
    }
};

/* =========================
   WORKOUT FLOW
========================= */

function goSelectWorkout(w) {
    currentWorkout = w;
    currentExerciseIdx = 0;
    currentSetIdx = 0;
    weights = {};
    completedSets = {};

    document.getElementById('preWorkoutLetter').textContent = w;
    document.getElementById('preWorkoutName').textContent = workoutData[w].name;

    showView('preWorkoutView');
}

function goStartWorkout() {
    updateWorkoutView();
    showView('workoutView');
    document.getElementById('headerStats').style.display = 'block';
}

function updateWorkoutView() {
    const workout = workoutData[currentWorkout];
    const exercise = workout.exercises[currentExerciseIdx];

    document.getElementById('exerciseName').textContent = exercise.name;
    document.getElementById('exerciseReps').textContent = exercise.reps;

    saveState();
}

/* =========================
   TIMER
========================= */

function startTimer(seconds) {
    timeRemaining = seconds;
    clearInterval(timerInterval);

    timerInterval = setInterval(() => {
        timeRemaining--;
        if (timeRemaining <= 0) clearInterval(timerInterval);
    }, 1000);
}

/* =========================
   INIT
========================= */

window.addEventListener('load', () => {
    loadState();
});
</script>
