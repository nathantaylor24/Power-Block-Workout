<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerBlock Workouts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f172a; color: white; height: 100vh; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        .header { background: rgba(30, 41, 59, 0.95); padding: 1rem; border-bottom: 1px solid rgba(148, 163, 184, 0.1); }
        .main { flex: 1; overflow-y: auto; padding: 1rem; }
        .view { display: none; }
        .view.active { display: block; }
        .btn { background: rgb(37, 99, 235); color: white; border: none; padding: 1rem; margin: 0.5rem 0; border-radius: 0.5rem; cursor: pointer; font-size: 1rem; width: 100%; }
        .btn:active { transform: scale(0.95); }
        .title { font-size: 3rem; font-weight: 800; text-align: center; margin: 2rem 0; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 2rem; }
        .back-btn { background: rgba(51, 65, 85, 0.8); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.375rem; cursor: pointer; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div id="headerTitle">Select Workout</div>
        </div>
        <div class="main">
            <!-- SELECT VIEW -->
            <div class="view active" id="selectView">
                <div class="title">POWERBLOCK</div>
                <div class="subtitle">Balloon Method Workouts</div>
                <button class="btn" onclick="goSelectWorkout('A')">Workout A - Chest & Back</button>
                <button class="btn" onclick="goSelectWorkout('B')">Workout B - Shoulders & Triceps</button>
                <button class="btn" onclick="goSelectWorkout('C')">Workout C - Legs & Glutes</button>
            </div>

            <!-- PRE-WORKOUT VIEW -->
            <div class="view" id="preWorkoutView">
                <button class="back-btn" onclick="goBack()">← Back</button>
                <h2>Workout <span id="preWorkoutLetter"></span></h2>
                <p id="preWorkoutName"></p>
                <button class="btn" onclick="goStartWorkout()">▶ START WORKOUT</button>
            </div>

            <!-- ACTIVE WORKOUT VIEW -->
            <div class="view" id="workoutView">
                <button class="back-btn" onclick="goBack()">← Back</button>
                <h2 id="exerciseName">Exercise</h2>
                <p>Reps: <span id="exerciseReps">10</span></p>
                <button class="btn" onclick="completeSet()">✓ SET COMPLETE</button>
            </div>
        </div>
    </div>

    <script>
        const workoutData = {
            A: { name: 'Chest & Back', exercises: [
                { name: 'DB Bench Press', sets: 4, reps: 8 },
                { name: 'DB Rows', sets: 4, reps: 8 },
                { name: 'Incline DB Press', sets: 3, reps: 10 },
                { name: 'Single Arm DB Rows', sets: 3, reps: 10 },
                { name: 'DB Flyes', sets: 2, reps: 12 },
                { name: 'DB Reverse Flyes', sets: 2, reps: 12 }
            ]},
            B: { name: 'Shoulders & Triceps', exercises: [
                { name: 'DB Shoulder Press', sets: 4, reps: 8 },
                { name: 'DB Lateral Raises', sets: 4, reps: 10 },
                { name: 'Overhead DB Tricep Extension', sets: 3, reps: 10 },
                { name: 'DB Incline Rows', sets: 3, reps: 10 },
                { name: 'Single DB Lateral Raise', sets: 2, reps: 12 },
                { name: 'Tricep Kickbacks', sets: 2, reps: 12 }
            ]},
            C: { name: 'Legs & Glutes', exercises: [
                { name: 'DB Goblet Squats', sets: 4, reps: 10 },
                { name: 'DB Romanian Deadlifts', sets: 4, reps: 8 },
                { name: 'DB Bulgarian Split Squats', sets: 3, reps: 10 },
                { name: 'DB Step-ups', sets: 3, reps: 10 },
                { name: 'DB Walking Lunges', sets: 2, reps: 12 },
                { name: 'Sumo DB Deadlifts', sets: 2, reps: 12 }
            ]}
        };

        let currentWorkout = null;
        let currentExerciseIdx = 0;
        let currentSetIdx = 0;
        let viewHistory = [];

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function goSelectWorkout(w) {
            currentWorkout = w;
            currentExerciseIdx = 0;
            currentSetIdx = 0;
            document.getElementById('preWorkoutLetter').textContent = w;
            document.getElementById('preWorkoutName').textContent = workoutData[w].name;
            showView('preWorkoutView');
            viewHistory.push('selectView');
        }

        function goStartWorkout() {
            updateWorkoutView();
            showView('workoutView');
            viewHistory.push('preWorkoutView');
        }

        function updateWorkoutView() {
            const exercise = workoutData[currentWorkout].exercises[currentExerciseIdx];
            document.getElementById('exerciseName').textContent = exercise.name;
            document.getElementById('exerciseReps').textContent = exercise.reps;
        }

        function completeSet() {
            currentSetIdx++;
            const exercise = workoutData[currentWorkout].exercises[currentExerciseIdx];
            
            if (currentSetIdx >= exercise.sets) {
                currentExerciseIdx++;
                currentSetIdx = 0;
                
                if (currentExerciseIdx >= workoutData[currentWorkout].exercises.length) {
                    alert('Workout Complete! 🔥');
                    currentWorkout = null;
                    currentExerciseIdx = 0;
                    showView('selectView');
                    viewHistory = [];
                    return;
                }
            }
            updateWorkoutView();
        }

        function goBack() {
            if (viewHistory.length > 0) {
                const prev = viewHistory.pop();
                showView(prev);
            }
        }
    </script>
</body>
</html>
